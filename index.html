<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NES Emulator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --panel: #1a1a26;
    --border: #2a2a40;
    --accent: #ff3366;
    --accent2: #00d4ff;
    --accent3: #ffcc00;
    --text: #e0e0f0;
    --text-dim: #6666aa;
    --dpad: #1e1e30;
    --dpad-border: #2e2e50;
    --screen-glow: rgba(0,212,255,0.18);

    --dpad-cell: 52px;
    --btn-ab: 68px;
    --sys-h: 40px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 42px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  #logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--accent2);
    text-shadow: 0 0 14px var(--accent2);
    letter-spacing: 2px;
  }

  #status-bar { display: flex; align-items: center; gap: 8px; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0; transition: background .3s;
  }
  .status-dot.running {
    background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  #rom-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px; color: var(--text-dim);
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  #fps-counter {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: var(--accent3); min-width: 52px; text-align: right;
  }

  /* ── SCREEN ── */
  #screen-container {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 6px 4px;
  }

  #screen-wrapper {
    position: relative;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px var(--border),
      0 0 0 4px #06060c,
      0 0 28px var(--screen-glow),
      0 0 56px rgba(0,212,255,.05);
  }
  #screen-wrapper::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.13) 2px, rgba(0,0,0,.13) 3px);
    pointer-events: none; z-index: 2;
  }
  #screen-wrapper::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.65) 100%);
    pointer-events: none; z-index: 3;
  }

  #canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.93);
    z-index: 10; cursor: pointer; border-radius: 4px;
  }
  #drop-overlay.hidden { display: none; }
  #drop-overlay:active { background: rgba(0,212,255,.06); }

  .drop-icon { font-size: 34px; margin-bottom: 10px; animation: float 2.2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

  .drop-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; color: var(--accent2);
    text-align: center; line-height: 1.7; text-shadow: 0 0 12px var(--accent2);
  }
  .drop-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px; color: var(--text-dim); margin-top: 8px; line-height: 1.7; text-align: center;
  }

  /* ── MENU BAR ── */
  #menu-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 5px 8px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .menu-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; padding: 8px 10px;
    border: 1.5px solid var(--border); border-radius: 5px;
    background: var(--panel); color: var(--text-dim);
    cursor: pointer; white-space: nowrap; transition: transform .12s;
    -webkit-touch-callout: none;
  }
  .menu-btn:active { transform: scale(.92); }
  .menu-btn.primary { border-color: var(--accent2); color: var(--accent2); }
  .menu-btn.primary:active { background: rgba(0,212,255,.1); }
  .menu-btn.danger  { border-color: var(--accent);  color: var(--accent); }
  .menu-btn.danger:active  { background: rgba(255,51,102,.1); }

  /* ── GAMEPAD ── */
  #gamepad {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 10px 16px 12px;
    gap: 0;
  }

  #center-row {
    display: flex; align-items: center;
    justify-content: center; gap: 16px; margin-bottom: 12px;
  }

  .sys-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; height: var(--sys-h); padding: 0 18px;
    border-radius: 24px; border: 1.5px solid #3a3a5a;
    background: #1e1e32; color: #9999bb;
    cursor: pointer; letter-spacing: 1px; transition: all .1s;
    -webkit-touch-callout: none;
  }
  .sys-btn:active { transform: scale(.91); background: #2a2a44; color: #fff; }

  #action-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  /* D-PAD */
  #dpad {
    position: relative;
    width: calc(var(--dpad-cell) * 3);
    height: calc(var(--dpad-cell) * 3);
    flex-shrink: 0;
  }

  .dpad-btn {
    position: absolute;
    width: var(--dpad-cell); height: var(--dpad-cell);
    background: var(--dpad); border: 1.5px solid var(--dpad-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #4a4a88; font-size: 20px;
    transition: background .08s, color .08s;
    -webkit-touch-callout: none;
  }
  .dpad-btn:active, .dpad-btn.pressed { background: #28284a; color: var(--accent2); }

  #dpad-up    { top:0;                          left:var(--dpad-cell); border-radius: 8px 8px 0 0; }
  #dpad-down  { bottom:0;                       left:var(--dpad-cell); border-radius: 0 0 8px 8px; }
  #dpad-left  { top:var(--dpad-cell); left:0;                          border-radius: 8px 0 0 8px; }
  #dpad-right { top:var(--dpad-cell); right:0;                         border-radius: 0 8px 8px 0; }
  #dpad-center {
    position: absolute;
    top: var(--dpad-cell); left: var(--dpad-cell);
    width: var(--dpad-cell); height: var(--dpad-cell);
    background: #141420; border: 1px solid #1c1c2e; pointer-events: none;
  }

  /* A / B */
  #ab-group { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  #ab-row   { display: flex; align-items: flex-end; gap: 18px; }
  .ab-wrap  { display: flex; flex-direction: column; align-items: center; gap: 5px; }

  .action-btn {
    width: var(--btn-ab); height: var(--btn-ab);
    border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: 'Press Start 2P', monospace;
    font-size: 18px; color: #fff;
    transition: transform .08s, box-shadow .08s;
    -webkit-touch-callout: none;
  }
  .action-btn:active, .action-btn.pressed { transform: translateY(4px); }

  #btn-b {
    background: radial-gradient(circle at 35% 32%, #ff9944, #cc4400);
    box-shadow: 0 5px 0 #7a2200, 0 0 22px rgba(255,102,0,.35);
    margin-bottom: 14px;
  }
  #btn-b:active { box-shadow: 0 1px 0 #7a2200; }

  #btn-a {
    background: radial-gradient(circle at 35% 32%, #ff557a, #cc1144);
    box-shadow: 0 5px 0 #800030, 0 0 22px rgba(255,51,102,.38);
  }
  #btn-a:active { box-shadow: 0 1px 0 #800030; }

  .ab-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); }

  /* Speed badge */
  #speed-badge {
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: var(--accent3); padding: 4px 8px;
    border: 1.5px solid rgba(255,204,0,.4); border-radius: 4px;
    cursor: pointer; -webkit-touch-callout: none;
  }
  #speed-badge:active { background: rgba(255,204,0,.1); }

  /* Notification */
  #notification {
    position: fixed; top: 52px; left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--panel); border: 1.5px solid var(--accent2);
    border-radius: 6px; padding: 9px 18px;
    font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--accent2);
    text-align: center; opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Save panel */
  #save-panel {
    position: fixed; bottom: -260px; left: 0; right: 0;
    background: var(--surface); border-top: 2px solid var(--border);
    padding: 14px 14px 24px; z-index: 150;
    transition: bottom .3s cubic-bezier(.34,1.56,.64,1);
    border-radius: 16px 16px 0 0;
  }
  #save-panel.open { bottom: 0; }

  .sp-title {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    color: var(--text-dim); text-align: center; margin-bottom: 14px;
  }
  .save-slots { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .save-slot {
    width: 76px; height: 58px; border: 1.5px solid var(--border);
    border-radius: 6px; background: var(--panel);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; gap: 6px;
    font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim);
    transition: transform .12s;
  }
  .save-slot:active { transform: scale(.94); }
  .save-slot.has-save { border-color: var(--accent2); color: var(--accent2); }
  .save-slot .si { font-size: 18px; }
  .sp-close {
    display: block; margin: 14px auto 0;
    font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 8px 20px;
    border: 1.5px solid var(--border); border-radius: 5px;
    background: var(--panel); color: var(--text-dim); cursor: pointer;
  }

  #rom-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="logo">NES</div>
    <div id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="rom-name">NO ROM</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="speed-badge" onclick="cycleSpeed()">▶ 1×</div>
      <div id="fps-counter">-- FPS</div>
    </div>
  </div>

  <div id="screen-container">
    <div id="screen-wrapper">
      <canvas id="canvas" width="256" height="240"></canvas>
      <div id="drop-overlay" onclick="document.getElementById('rom-input').click()">
        <div class="drop-icon">🎮</div>
        <div class="drop-title">TAP TO LOAD ROM</div>
        <div class="drop-sub">supports .nes files<br>up to 4 MB</div>
      </div>
    </div>
  </div>

  <div id="menu-bar">
    <button class="menu-btn primary" onclick="document.getElementById('rom-input').click()">📂 ROM</button>
    <button class="menu-btn"         onclick="toggleSavePanel()">💾 SAVE</button>
    <button class="menu-btn"         onclick="resetGame()">🔄 RST</button>
    <button class="menu-btn danger"  onclick="stopGame()">⏹ STOP</button>
    <button class="menu-btn"         onclick="toggleSound()" id="snd-btn">🔊</button>
  </div>

  <div id="gamepad">
    <div id="center-row">
      <button class="sys-btn"
        ontouchstart="btnDown(0,'SELECT');event.preventDefault()"
        ontouchend="btnUp(0,'SELECT');event.preventDefault()"
        onmousedown="btnDown(0,'SELECT')" onmouseup="btnUp(0,'SELECT')">SELECT</button>
      <button class="sys-btn"
        ontouchstart="btnDown(0,'START');event.preventDefault()"
        ontouchend="btnUp(0,'START');event.preventDefault()"
        onmousedown="btnDown(0,'START')" onmouseup="btnUp(0,'START')">START</button>
    </div>

    <div id="action-row">
      <div id="dpad">
        <div class="dpad-btn" id="dpad-up"
          ontouchstart="btnDown(0,'UP');event.preventDefault()"
          ontouchend="btnUp(0,'UP');event.preventDefault()"
          onmousedown="btnDown(0,'UP')" onmouseup="btnUp(0,'UP')">▲</div>
        <div class="dpad-btn" id="dpad-down"
          ontouchstart="btnDown(0,'DOWN');event.preventDefault()"
          ontouchend="btnUp(0,'DOWN');event.preventDefault()"
          onmousedown="btnDown(0,'DOWN')" onmouseup="btnUp(0,'DOWN')">▼</div>
        <div class="dpad-btn" id="dpad-left"
          ontouchstart="btnDown(0,'LEFT');event.preventDefault()"
          ontouchend="btnUp(0,'LEFT');event.preventDefault()"
          onmousedown="btnDown(0,'LEFT')" onmouseup="btnUp(0,'LEFT')">◀</div>
        <div class="dpad-btn" id="dpad-right"
          ontouchstart="btnDown(0,'RIGHT');event.preventDefault()"
          ontouchend="btnUp(0,'RIGHT');event.preventDefault()"
          onmousedown="btnDown(0,'RIGHT')" onmouseup="btnUp(0,'RIGHT')">▶</div>
        <div id="dpad-center"></div>
      </div>

      <div id="ab-group">
        <div id="ab-row">
          <div class="ab-wrap">
            <button class="action-btn" id="btn-b"
              ontouchstart="btnDown(0,'B');event.preventDefault()"
              ontouchend="btnUp(0,'B');event.preventDefault()"
              onmousedown="btnDown(0,'B')" onmouseup="btnUp(0,'B')">B</button>
            <div class="ab-label">B</div>
          </div>
          <div class="ab-wrap">
            <button class="action-btn" id="btn-a"
              ontouchstart="btnDown(0,'A');event.preventDefault()"
              ontouchend="btnUp(0,'A');event.preventDefault()"
              onmousedown="btnDown(0,'A')" onmouseup="btnUp(0,'A')">A</button>
            <div class="ab-label">A</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="save-panel">
  <div class="sp-title">── SAVE STATES ──</div>
  <div class="save-slots" id="save-slots"></div>
  <button class="sp-close" onclick="toggleSavePanel()">CLOSE</button>
</div>

<div id="notification"></div>
<input type="file" id="rom-input" accept=".nes" onchange="loadROMFile(this)">

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation?.(); }

let nes = null, animFrameId = null, isRunning = false;
let soundEnabled = true, speedIdx = 0;
const SPEEDS = [1, 2, 0.5], SPEED_LABELS = ['1×', '2×', '½×'];
let currentRomName = '', saveStates = {};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(256, 240);
const buf32 = new Uint32Array(imageData.data.buffer);

function resizeCanvas() {
  const cont = document.getElementById('screen-container');
  const W = cont.clientWidth - 12, H = cont.clientHeight - 10;
  const scale = Math.min(W / 256, H / 240);
  const w = Math.floor(256 * scale), h = Math.floor(240 * scale);
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const wr = document.getElementById('screen-wrapper');
  wr.style.width = w + 'px'; wr.style.height = h + 'px';
}

let audioCtx = null, audioBuffer = [];
const SAMPLE_RATE = 44100, BUFFER_SIZE = 4096;

function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    const node = audioCtx.createScriptProcessor(BUFFER_SIZE, 0, 1);
    node.onaudioprocess = e => {
      const out = e.outputBuffer.getChannelData(0);
      const len = Math.min(audioBuffer.length, BUFFER_SIZE);
      for (let i = 0; i < len; i++) out[i] = audioBuffer.shift();
      for (let i = len; i < BUFFER_SIZE; i++) out[i] = 0;
    };
    node.connect(audioCtx.destination);
  } catch(e) {}
}

function resumeAudio() { if (audioCtx?.state === 'suspended') audioCtx.resume(); }

function initNES() {
  nes = new jsnes.NES({
    onFrame(fb) {
      for (let i = 0; i < fb.length; i++) buf32[i] = 0xFF000000 | (fb[i] & 0xFFFFFF);
      ctx.putImageData(imageData, 0, 0);
    },
    onAudioSample(l, r) {
      if (soundEnabled && audioBuffer.length < BUFFER_SIZE * 4) audioBuffer.push((l + r) / 2);
    },
    sampleRate: SAMPLE_RATE
  });
}

function loadROMFile(input) {
  const file = input.files[0]; if (!file) return;
  if (!file.name.endsWith('.nes')) { notify('⚠ NOT A .NES FILE'); return; }
  if (file.size > 4*1024*1024) { notify('⚠ FILE TOO LARGE'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      resumeAudio(); stopGame(true); initNES();
      nes.loadROM(e.target.result);
      currentRomName = file.name.replace(/\.nes$/i,'').toUpperCase().slice(0,18);
      document.getElementById('rom-name').textContent = currentRomName;
      document.getElementById('drop-overlay').classList.add('hidden');
      document.getElementById('status-dot').className = 'status-dot running';
      startLoop(); notify('▶ ' + currentRomName);
    } catch(err) { notify('⚠ ROM LOAD ERROR'); console.error(err); }
  };
  reader.readAsBinaryString(file); input.value = '';
}

let lastTime=0, frameCount=0, fpsTime=0;
function startLoop() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  isRunning = true; lastTime = performance.now(); loop(lastTime);
}
function loop(now) {
  if (!isRunning) return;
  animFrameId = requestAnimationFrame(loop);
  const dt = now - lastTime; lastTime = now;
  frameCount++; fpsTime += dt;
  if (fpsTime >= 500) {
    document.getElementById('fps-counter').textContent = Math.round(frameCount/fpsTime*1000)+' FPS';
    frameCount = 0; fpsTime = 0;
  }
  if (nes) try { const n=Math.max(1,Math.round(SPEEDS[speedIdx])); for(let i=0;i<n;i++) nes.frame(); } catch(e){}
}

const BTN_MAP = {
  A:jsnes.Controller.BUTTON_A, B:jsnes.Controller.BUTTON_B,
  SELECT:jsnes.Controller.BUTTON_SELECT, START:jsnes.Controller.BUTTON_START,
  UP:jsnes.Controller.BUTTON_UP, DOWN:jsnes.Controller.BUTTON_DOWN,
  LEFT:jsnes.Controller.BUTTON_LEFT, RIGHT:jsnes.Controller.BUTTON_RIGHT,
};
function btnDown(p,b){ if(nes&&isRunning){resumeAudio();nes.buttonDown(p+1,BTN_MAP[b]);} }
function btnUp(p,b)  { if(nes&&isRunning) nes.buttonUp(p+1,BTN_MAP[b]); }

const keyMap={ArrowUp:['UP'],ArrowDown:['DOWN'],ArrowLeft:['LEFT'],ArrowRight:['RIGHT'],
  z:['A'],Z:['A'],x:['B'],X:['B'],Enter:['START'],Shift:['SELECT'],' ':['A']};
document.addEventListener('keydown',e=>{const b=keyMap[e.key];if(b){btnDown(0,b[0]);e.preventDefault();}});
document.addEventListener('keyup',  e=>{const b=keyMap[e.key];if(b) btnUp(0,b[0]);});
document.addEventListener('contextmenu',e=>e.preventDefault());

function stopGame(silent=false) {
  if (animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  isRunning=false; nes=null;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,256,240);
  document.getElementById('status-dot').className='status-dot';
  document.getElementById('rom-name').textContent='NO ROM';
  document.getElementById('drop-overlay').classList.remove('hidden');
  document.getElementById('fps-counter').textContent='-- FPS';
  if(!silent) notify('⏹ STOPPED');
}
function resetGame() { if(!nes)return; resumeAudio(); nes.reset(); notify('🔄 RESET'); }

function toggleSound() {
  soundEnabled=!soundEnabled;
  document.getElementById('snd-btn').textContent=soundEnabled?'🔊':'🔇';
  notify(soundEnabled?'🔊 SOUND ON':'🔇 MUTE');
}
function cycleSpeed() {
  speedIdx=(speedIdx+1)%SPEEDS.length;
  document.getElementById('speed-badge').textContent='▶ '+SPEED_LABELS[speedIdx];
  notify('SPEED '+SPEED_LABELS[speedIdx]);
}

let savePanelOpen=false;
function renderSaveSlots() {
  const c=document.getElementById('save-slots'); c.innerHTML='';
  for(let i=1;i<=4;i++){
    const key='sv_'+currentRomName+'_'+i, has=!!saveStates[key];
    const el=document.createElement('div');
    el.className='save-slot'+(has?' has-save':'');
    el.innerHTML=`<div class="si">${has?'💾':'◻'}</div><div>SLOT ${i}</div>`;
    el.onclick=()=>{
      if(!nes){notify('⚠ NO ROM');return;}
      if(has){try{nes.fromJSON(saveStates[key]);notify('📂 SLOT '+i+' LOADED');toggleSavePanel();}catch(e){notify('⚠ LOAD ERR');}}
      else   {try{saveStates[key]=nes.toJSON();notify('💾 SLOT '+i+' SAVED');renderSaveSlots();}catch(e){notify('⚠ SAVE ERR');}}
    };
    c.appendChild(el);
  }
}
function toggleSavePanel() {
  savePanelOpen=!savePanelOpen;
  const p=document.getElementById('save-panel');
  if(savePanelOpen){renderSaveSlots();p.classList.add('open');}
  else p.classList.remove('open');
}

let notifyT=null;
function notify(msg) {
  const el=document.getElementById('notification');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(notifyT); notifyT=setTimeout(()=>el.classList.remove('show'),2200);
}

// D-Pad joystick touch
const dpadEl=document.getElementById('dpad');
let activeDpad=null;
function dpadPress(btn) {
  if(btn===activeDpad)return;
  if(activeDpad){btnUp(0,activeDpad);document.getElementById('dpad-'+activeDpad.toLowerCase())?.classList.remove('pressed');}
  activeDpad=btn; btnDown(0,btn); document.getElementById('dpad-'+btn.toLowerCase())?.classList.add('pressed');
}
function dpadRelease() {
  if(activeDpad){btnUp(0,activeDpad);document.getElementById('dpad-'+activeDpad.toLowerCase())?.classList.remove('pressed');activeDpad=null;}
}
function dpadFromTouch(t) {
  const r=dpadEl.getBoundingClientRect();
  const dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  if(Math.hypot(dx,dy)<8)return;
  dpadPress(Math.abs(dx)>Math.abs(dy)?(dx>0?'RIGHT':'LEFT'):(dy>0?'DOWN':'UP'));
}
dpadEl.addEventListener('touchstart',e=>{e.preventDefault();dpadFromTouch(e.touches[0]);},{passive:false});
dpadEl.addEventListener('touchmove', e=>{e.preventDefault();if(e.touches.length)dpadFromTouch(e.touches[0]);},{passive:false});
dpadEl.addEventListener('touchend',  e=>{e.preventDefault();dpadRelease();},{passive:false});

function init() {
  initAudio(); resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', ()=>setTimeout(resizeCanvas,200));
  ctx.fillStyle='#000'; ctx.fillRect(0,0,256,240);
  if(tg?.themeParams?.bg_color) document.documentElement.style.setProperty('--bg',tg.themeParams.bg_color);
  notify('READY • LOAD A .NES ROM');
}
init();
</script>
